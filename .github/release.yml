changelog:
  exclude:
    labels:
      - skip-release-notes
  categories:
    - title: 🚀 Features
      labels:
        - feature
        - enhancement
    - title: 🐛 Fixes
      labels:
        - bug
        - fix
    - title: 📚 Documentation
      labels:
        - docs
        - documentation
    - title: 🧰 Maintenance
      labels:
        - chore
        - dependencies
        - refactor
    - title: 🔁 Other Changes
      labels:
        - "*"
